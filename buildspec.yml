version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 263296414775.dkr.ecr.us-east-1.amazonaws.com

  build:
    commands:
      - echo Building Docker image
      - docker build -t rag-fastapi .

      - echo Tagging Docker image
      - docker tag rag-fastapi:latest 263296414775.dkr.ecr.us-east-1.amazonaws.com/rag-fastapi:latest

      - echo Running container
      - docker run -d -p 8000:8000 --name rag-container rag-fastapi

      - echo Waiting for app to start
      - sleep 10

      - echo Testing health endpoint
      - curl http://localhost:8000/health

  post_build:
    commands:
      - echo Pushing image to ECR
      - docker push 263296414775.dkr.ecr.us-east-1.amazonaws.com/rag-fastapi:latest